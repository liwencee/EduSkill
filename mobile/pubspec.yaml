name: skillbridge_nigeria
description: Upskill Teachers. Empower Youth. Connect to Opportunity.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Offline storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Video player
  video_player: ^2.8.7
  chewie: ^1.8.3

  # Background work (offline sync)
  workmanager: ^0.5.2

  # Downloads
  flutter_downloader: ^1.11.7
  permission_handler: ^11.3.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  percent_indicator: ^4.2.3

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Payments
  flutter_paystack: ^1.0.7

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf   weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf weight: 600
        - asset: assets/fonts/Inter-Bold.ttf     weight: 700
