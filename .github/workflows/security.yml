name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Run npm audit (all levels — report only)
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  sast:
    name: Static Application Security Testing (ESLint Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security plugin
        run: npx eslint src --ext .js --plugin security --rule 'security/detect-non-literal-fs-filename: error' --rule 'security/detect-object-injection: warn' --format json --output-file eslint-security-report.json || true

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: eslint-security-report.json

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with git-secrets patterns
        run: |
          # Check for common secret patterns in code (not .env.example which is intentional)
          git log --all --full-history --diff-filter=A -- '*.env' | grep -v '.env.example' && echo "WARNING: .env files committed" || true

          # Check for hardcoded credential patterns
          grep -rn --include="*.js" \
            -e "password\s*=\s*['\"][^'\"]\{8,\}['\"]" \
            -e "secret\s*=\s*['\"][^'\"]\{8,\}['\"]" \
            -e "api_key\s*=\s*['\"][^'\"]\{8,\}['\"]" \
            src/ || echo "No hardcoded credentials found"

      - name: Block .env files from being committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.(local|production|staging)$'; then
            echo "ERROR: .env file is tracked by git! Remove it with: git rm --cached .env"
            exit 1
          fi
          echo "No .env secrets committed"

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;CC0-1.0;Unlicense' --excludePrivatePackages || echo "License check complete — review any flagged packages"
