name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  IMAGE_NAME: eduskill

jobs:
  # ── 1. ESLint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Unit tests ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-jwt-secret-long-enough-32chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_TEST || 'ci-test-refresh-secret-32-chars-x' }}

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: coverage/

  # ── 3. Integration tests ─────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-jwt-secret-long-enough-32chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_TEST || 'ci-test-refresh-secret-32-chars-x' }}

  # ── 4. Security tests ────────────────────────────────────────
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: npm run test:security
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-jwt-secret-long-enough-32chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_TEST || 'ci-test-refresh-secret-32-chars-x' }}

  # ── 5. Docker build — lint gate + image smoke test ───────────
  docker-build:
    name: Docker Build (Lint Gate + Smoke Test)
    runs-on: ubuntu-latest
    needs: lint          # ESLint must pass before we even attempt a Docker build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the lint stage — this re-runs ESLint *inside* the Docker layer.
      # If any ESLint rule fires as an error, docker build exits non-zero here.
      - name: Build lint stage (ESLint gate inside Docker)
        run: |
          docker build \
            --target lint \
            --tag ${{ env.IMAGE_NAME }}:lint-check \
            .

      # Build the full production image
      - name: Build production image
        run: |
          docker build \
            --target production \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --build-arg NODE_ENV=production \
            .

      # Run the container (named Eduskill) and hit the health endpoint
      - name: Smoke test — start container named Eduskill
        run: |
          docker run --rm -d \
            --name Eduskill \
            -p 3000:3000 \
            -e NODE_ENV=test \
            -e JWT_SECRET=ci-test-jwt-secret-long-enough-32chars \
            -e JWT_REFRESH_SECRET=ci-test-refresh-secret-32-chars-x \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          # Give the server time to start
          sleep 8

          # Health check
          curl -sf http://localhost:3000/api/v1/health \
            && echo "✅ Container Eduskill is healthy" \
            || (echo "❌ Health check failed — container logs:" && docker logs Eduskill && exit 1)

          docker stop Eduskill

      # Save the image as a build artifact so deploy.yml can reuse it
      - name: Export image tarball
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > eduskill-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduskill-image-${{ github.sha }}
          path: eduskill-image.tar.gz
          retention-days: 1

  # ── 6. Coverage report ───────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-jwt-secret-long-enough-32chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_TEST || 'ci-test-refresh-secret-32-chars-x' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
