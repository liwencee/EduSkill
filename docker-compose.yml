version: '3.8'

services:
  api:
    build:
      context: .
      target: production
    container_name: skillbridge-api
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - skillbridge-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  api-dev:
    build:
      context: .
      target: builder
    container_name: skillbridge-api-dev
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src:ro
    command: ['node', 'src/server.js']
    networks:
      - skillbridge-net
    profiles: [dev]

networks:
  skillbridge-net:
    driver: bridge
